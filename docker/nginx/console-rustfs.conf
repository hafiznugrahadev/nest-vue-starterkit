# ╭──────────────────────────────────────────────────────────────────────────╮
# │ nginx for the RustFS console UI. OrbStack auto-issues HTTPS for this        │
# │ container at console-rustfs.starterkit-dev.orb.local and forwards to :80;   │
# │ nginx proxies to the rustfs console on port 9001.                           │
# │ (The S3 API on 9000 is served directly via the rustfs auto-domain.)         │
# ╰──────────────────────────────────────────────────────────────────────────╯
server {
    listen 80;
    server_name _;

    client_max_body_size 0;

    location / {
        proxy_pass http://rustfs:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Console pushes live updates over websockets.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
