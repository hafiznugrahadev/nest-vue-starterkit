# ╭──────────────────────────────────────────────────────────────────────────╮
# │ nginx vhost: splits ONE OrbStack-fronted container into TWO domains.        │
# │   OrbStack terminates HTTPS and forwards both custom domains to this nginx   │
# │   on :80; nginx routes by Host (server_name) to the right rustfs port.       │
# │     rustfs.starterkit.local          → rustfs:9000  (S3 API / objects)       │
# │     console-rustfs.starterkit.local  → rustfs:9001  (web console UI)         │
# ╰──────────────────────────────────────────────────────────────────────────╯

# ── S3 API (data plane): serves stored objects to the browser (S3_PUBLIC_BASE_URL).
server {
    listen 80;
    server_name rustfs.starterkit.local;

    # Allow large object uploads/downloads; stream instead of buffering to disk.
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;

    location / {
        proxy_pass http://rustfs:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Console UI (admin browser app).
server {
    listen 80;
    server_name console-rustfs.starterkit.local;

    client_max_body_size 0;

    location / {
        proxy_pass http://rustfs:9001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Console pushes live updates over websockets.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
