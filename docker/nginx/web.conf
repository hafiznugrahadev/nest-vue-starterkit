# Serves the Vue SPA build. History-mode routing falls back to index.html.
server {
    listen 4301;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: any unknown path resolves to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry document so new deploys roll out immediately.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
