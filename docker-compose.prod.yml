# ╭──────────────────────────────────────────────────────────────────────────╮
# │ PROD stack — FULL self-hosted production environment                         │
# │   infra:  postgres + redis + rustfs (S3-compatible storage)                 │
# │   apps:   api + web, built from multi-stage Dockerfiles               │
# │   NO mailpit — configure a real SMTP via MAIL_* env vars                    │
# │                                                                            │
# │ Build:  docker compose -f docker-compose.prod.yml build                     │
# │ Run:    docker compose -f docker-compose.prod.yml up -d                     │
# ╰──────────────────────────────────────────────────────────────────────────╯
name: starterkit-prod

services:
  postgres:
    image: postgres:17-alpine
    container_name: starterkit-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-starterkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-starterkit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-starterkit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [starterkit]

  redis:
    image: redis:7-alpine
    container_name: starterkit-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [starterkit]

  rustfs:
    image: rustfs/rustfs:latest
    container_name: starterkit-rustfs-prod
    restart: unless-stopped
    user: "10001:10001"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "false"
    volumes:
      - rustfs_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9000/healthz/live > /dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [starterkit]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: starterkit-api:latest
    container_name: starterkit-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: ${API_PORT:-4400}
      API_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-starterkit}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-starterkit}?schema=public
      # Set REDIS_URL in .env to use a managed Redis (overrides host/port/password).
      REDIS_URL: ${REDIS_URL:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      APP_URL: ${APP_URL}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # File logging — daily-rotated files persisted to the api_logs volume below.
      LOG_DIR: ${LOG_DIR:-./storage/logs}
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      SWAGGER_USER: ${SWAGGER_USER:-}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-}
      AUTH_REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
      # Real SMTP — set MAIL_* in .env (e.g. SendGrid, Resend, SES)
      MAIL_TRANSPORT: ${MAIL_TRANSPORT:-smtp}
      MAIL_FROM: ${MAIL_FROM}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_SECURE: ${MAIL_SMTP_SECURE:-true}
      MAIL_SMTP_USER: ${MAIL_SMTP_USER:-}
      MAIL_SMTP_PASS: ${MAIL_SMTP_PASS:-}
      # File storage (S3 via RustFS)
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
      S3_BUCKET: ${S3_BUCKET:-starterkit}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    # Persist daily-rotated log files (WORKDIR=/app/apps/api + LOG_DIR=./storage/logs).
    volumes:
      - api_logs:/app/apps/api/storage/logs
    # Host port forwarding disabled — expose via a reverse proxy on the `starterkit` network.
    # ports:
    #   - '${API_PORT:-4400}:${API_PORT:-4400}'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
    networks: [starterkit]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE}
        VITE_REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-false}
    image: starterkit-web:latest
    container_name: starterkit-web-prod
    restart: unless-stopped
    # Static SPA served by nginx inside the image (port 4301) — no runtime env needed;
    # public config is baked into the bundle via the VITE_* build args above.
    # Host port forwarding disabled — expose via a reverse proxy on the `starterkit` network.
    # ports:
    #   - '${WEB_PORT:-4301}:${WEB_PORT:-4301}'
    depends_on:
      - api
    networks: [starterkit]

networks:
  starterkit:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  api_logs:
