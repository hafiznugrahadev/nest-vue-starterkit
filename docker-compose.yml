# ╭──────────────────────────────────────────────────────────────────────────╮
# │ DEV stack — full local environment with HOT RELOAD                          │
# │   infra:  postgres + redis + rustfs + mailpit                               │
# │   apps:   api (nest --watch) + web (Vite HMR), bind-mounted                  │
# │                                                                            │
# │ OrbStack auto-issues HTTPS for each service at <service>.starterkit-dev.orb │
# │ .local — no custom domain labels needed. A small nginx (console-rustfs)     │
# │ only fronts the RustFS console UI.                                          │
# │   https://web.starterkit-dev.orb.local  → web                               │
# │   https://api.starterkit-dev.orb.local  → api                               │
# │ Run:  docker compose up            (full hot-reload stack)                   │
# │ Infra only:  docker compose up postgres redis                               │
# ╰──────────────────────────────────────────────────────────────────────────╯
name: starterkit-dev

services:
  postgres:
    image: postgres:17-alpine
    container_name: starterkit-nest-vue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-starterkit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-starterkit}
      POSTGRES_DB: ${POSTGRES_DB:-starterkit}
    # No host ports — OrbStack auto-domain serves DB clients at
    # postgres.starterkit-dev.orb.local:5432.
    # ports:
    #   - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-starterkit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [localdev]

  redis:
    image: redis:7-alpine
    container_name: starterkit-nest-vue-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    # No host ports — OrbStack auto-domain serves clients at
    # redis.starterkit-dev.orb.local:6379.
    # ports:
    #   - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [localdev]

  rustfs:
    image: rustfs/rustfs:latest
    container_name: starterkit-nest-vue-rustfs
    restart: unless-stopped
    user: "10001:10001"
    environment:
      RUSTFS_VOLUMES: /data
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ENABLE: "true"
    # No host ports. rustfs exposes two HTTP ports (9000 S3 API, 9001 console);
    # http-port=9000 points the OrbStack auto-domain at the S3 API:
    #   https://rustfs.starterkit-dev.orb.local → S3 API / objects.
    # The console (9001) is fronted separately by the console-rustfs service below.
    # ports:
    #   - '${RUSTFS_API_PORT:-9000}:9000'
    #   - '${RUSTFS_CONSOLE_PORT:-9001}:9001'
    volumes:
      - rustfs_data:/data
    healthcheck:
      # rustfs serves an S3 API with no unauthenticated health endpoint — every
      # path (incl. /healthz/*) returns 403 AccessDenied. A 403 still proves the
      # HTTP server is alive, so treat any HTTP response as healthy and a failed
      # connection (no 'HTTP/' status line) as unhealthy.
      test:
        [
          "CMD-SHELL",
          'wget -q -S -O /dev/null http://localhost:9000/ 2>&1 | grep -q "HTTP/"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - dev.orbstack.http-port=9000
    networks: [localdev]

  # Tiny nginx so the RustFS console gets its own OrbStack auto-domain
  # (console-rustfs.starterkit-dev.orb.local → rustfs:9001). A single container
  # can only map one port to its auto-domain, so the console needs this proxy.
  console-rustfs:
    image: nginx:alpine
    container_name: starterkit-nest-vue-console-rustfs
    restart: unless-stopped
    volumes:
      - ./docker/nginx/console-rustfs.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      rustfs:
        condition: service_started
    labels:
      - dev.orbstack.http-port=80
    networks: [localdev]

  api:
    image: oven/bun:1.3.3
    container_name: starterkit-nest-vue-api-dev
    restart: unless-stopped
    working_dir: /app
    # Bootstrap via the dev entrypoint script (run with `sh` so the bind-mounted
    # file needs no exec bit). See docker/dev-api.sh.
    entrypoint: ["sh", "/app/docker/dev-api.sh"]
    environment:
      NODE_ENV: development
      PORT: ${API_PORT:-4400}
      API_PREFIX: api
      DATABASE_URL: postgresql://${POSTGRES_USER:-starterkit}:${POSTGRES_PASSWORD:-starterkit}@postgres:5432/${POSTGRES_DB:-starterkit}?schema=public
      # Reach Redis by the compose service name — the OrbStack domain only resolves
      # on the host. Set EXPLICITLY (not forwarded from .env) so a host-oriented
      # REDIS_URL/REDIS_HOST in .env can't leak into the container via NestJS's
      # dotenv load and break it — same reason DATABASE_URL is hardcoded to @postgres.
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-min-16-chars}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_DAYS: 7
      # Base URL of the frontend — single source of truth (like Laravel APP_URL).
      # The web auto-domain (OrbStack HTTPS). Override via .env if it differs.
      APP_URL: ${APP_URL:-https://web.starterkit-dev.orb.local}
      # CORS_ORIGIN defaults to APP_URL in code; set only to explicitly override.
      CORS_ORIGIN: ${CORS_ORIGIN:-https://web.starterkit-dev.orb.local}
      # Shared parent domain → refresh cookie reaches both app + api subdomains.
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-starterkit-dev.orb.local}
      LOG_LEVEL: debug
      # Dev/E2E: skip rate limiting so rapid test runs aren't throttled.
      THROTTLE_DISABLED: ${THROTTLE_DISABLED:-true}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      SWAGGER_USER: ${SWAGGER_USER:-admin}
      SWAGGER_PASSWORD: ${SWAGGER_PASSWORD:-admin}
      # Dev email → Mailpit (catch-all SMTP; web UI at http://localhost:8025).
      MAIL_TRANSPORT: smtp
      MAIL_FROM: ${MAIL_FROM:-Starter Kit <no-reply@starterkit.test>}
      MAIL_SMTP_HOST: mailpit
      MAIL_SMTP_PORT: 1025
      MAIL_SMTP_SECURE: "false"
      # Self-service registration (dev: on). Keep the API + web flags in sync.
      AUTH_REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      # File storage — defaults to local; set STORAGE_DRIVER=s3 in .env to use RustFS.
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
      S3_BUCKET: ${S3_BUCKET:-starterkit}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-rustfsadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-rustfsadmin}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      # Browser-facing base for stored objects. No host port is published, so use
      # the rustfs OrbStack auto-domain (→ S3 API 9000) instead of localhost.
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-https://rustfs.starterkit-dev.orb.local/starterkit}
    # No host ports — served via the OrbStack auto-domain (api.starterkit-dev.orb.local).
    # ports:
    #   - '${API_PORT:-4400}:${API_PORT:-4400}'
    volumes:
      - ./:/app
      - api_node_modules:/app/node_modules # keep the container's linux-native deps
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started
      rustfs:
        condition: service_started
    networks: [localdev]
  web:
    image: oven/bun:1.3.3
    container_name: starterkit-nest-vue-web-dev
    restart: unless-stopped
    working_dir: /app
    # Bootstrap via the dev entrypoint script (installs deps + builds shared-types
    # before starting Vite). See docker/dev-web.sh.
    entrypoint: ["sh", "/app/docker/dev-web.sh"]
    environment:
      NODE_ENV: development
      PORT: ${WEB_PORT:-4301}
      HOST: 0.0.0.0
      # Browser → API over the public HTTPS auto-domain (OrbStack TLS).
      VITE_API_BASE: ${VITE_API_BASE:-https://api.starterkit-dev.orb.local/api}
      VITE_REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      # HMR client dials the web auto-domain over wss (behind the OrbStack proxy).
      VITE_HMR_HOST: ${VITE_HMR_HOST:-web.starterkit-dev.orb.local}
      # Bind-mount file events don't cross into the container on macOS/Windows,
      # so Vite must poll for HMR to work.
      VITE_DEV_POLLING: "true"
    # No host ports — served via the OrbStack auto-domain (web.starterkit-dev.orb.local).
    # ports:
    #   - '${WEB_PORT:-4301}:${WEB_PORT:-4301}'
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    networks: [localdev]

  # Dev mail catcher — SMTP sink + web UI. The API (MAIL_TRANSPORT=smtp) sends here;
  # open the UI to read password-reset and other emails. Not for production.
  mailpit:
    image: axllent/mailpit:latest
    container_name: starterkit-nest-vue-mailpit
    restart: unless-stopped
    # No host ports — SMTP reachable in-network (mailpit:1025); the UI is served
    # at mailpit.starterkit-dev.orb.local. mailpit exposes two ports (1025 SMTP +
    # 8025 UI), so http-port pins the auto-domain to the UI.
    # ports:
    #   - '${MAILPIT_SMTP_PORT:-1025}:1025' # SMTP endpoint (API → mailpit:1025)
    #   - '${MAILPIT_UI_PORT:-8025}:8025' # Web UI → http://localhost:8025
    labels:
      - dev.orbstack.http-port=8025
    networks: [localdev]

  # Lightweight web UI for PostgreSQL, served at adminer.starterkit-dev.orb.local
  # (OrbStack auto-domain → the container's single HTTP port 8080). The login is
  # pre-filled with the `postgres` service (creds from the env above). The "simple"
  # theme (docker/adminer/adminer.css) is auto-loaded by Adminer.
  adminer:
    image: adminer:latest
    container_name: starterkit-nest-vue-adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB: ${POSTGRES_DB:-starterkit}
    volumes:
      - ./docker/adminer/adminer.css:/var/www/html/adminer.css:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks: [localdev]

# Local dev network — created automatically by `docker compose up`.
networks:
  localdev:
    name: localdev
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rustfs_data:
  api_node_modules:
  web_node_modules:
